services:
  vue-app:
    build:
      context: .
      target: dev
    container_name: tech-support-front
    init: true
    env_file:
      - .env
    ports:
      - "127.0.0.1:5173:80"
    volumes:
      - .:/app
      - frontend_node_modules:/app/node_modules
    networks:
      - vue

networks:
  vue:
    driver: bridge

volumes:
  frontend_node_modules: